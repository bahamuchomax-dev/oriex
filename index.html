<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF8F3" />
    <!-- iOS PWA（ホーム画面に追加）でフルスクリーン standalone にする -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oriex" />
    <!-- 反映を早めるためのキャッシュ無効化 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Oriex</title>
    <!-- PWA: static manifest + icons (public/). Relative './' keeps these working
         on GitHub Pages sub-paths, matching the original deployment. -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-180.png" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Comfortaa:wght@500;700&family=Quicksand:wght@600;700&family=Fredoka:wght@500;600;700&family=Varela+Round&family=Mochiy+Pop+One&display=swap" rel="stylesheet" />
    <!-- three.js must load (classic) BEFORE the app module so window.THREE exists
         when the hamster scene function runs. -->
    <script src="./three.min.js"></script>
    <!-- screen orientation lock (verbatim from original deployment) -->
    <script>try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock("portrait").catch(function(){})}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
  </body>
</html>
