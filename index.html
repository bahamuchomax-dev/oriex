<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- Safe CSP subset deliverable via <meta> on a static host. Restricts
         plugin embeds and <base> hijacking without touching scripts/styles/
         fonts/connect (a strict script-src needs the legacy bundle's dynamic
         scripts + inline portrait-lock to be resolved first — see docs/XSS_AUDIT.md). -->
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF8F3" />
    <!-- iOS PWA (Add to Home Screen): fullscreen standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oriex" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-180.png" />
    <title>Oriex</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Comfortaa:wght@500;700&family=Quicksand:wght@600;700&family=Fredoka:wght@500;600;700&family=Varela+Round&family=Mochiy+Pop+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/utilities.css" />
    <link rel="stylesheet" href="./src/styles/app.css" />
    <!-- Opt-in "研鑽" re-skin of the original/legacy UI. Inert unless <body class="ox-skin">. -->
    <link rel="stylesheet" href="./src/styles/skin-kensan.css" />

    <!-- 3D engine (three.js) is NOT loaded here synchronously anymore.
         It was render-blocking on every page; it is now fetched off the
         critical path via src/services/loadThree.js (see main.js). -->
    <!-- best-effort portrait lock (ignored on desktop) -->
    <script>try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock("portrait").catch(function(){})}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
