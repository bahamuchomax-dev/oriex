<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- Safe CSP subset deliverable via <meta> on a static host. Blocks plugin embeds
         (object-src), <base> hijacking (base-uri), cross-origin form posts (form-action),
         and forces https subresources (upgrade-insecure-requests). A strict script-src is
         NOT added: the legacy bundle's dynamic chunk imports + inline portrait-lock need it
         resolved first (see docs/XSS_AUDIT.md). frame-ancestors / X-Frame-Options are
         HTTP-header-only (GitHub Pages can't set them) — clickjacking is handled by the
         frame-buster below. -->
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" />
    <!-- Don't leak full URLs (which can carry ids) to third parties or on downgrade. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Clickjacking defense (frame-ancestors is header-only on a static host). Acts ONLY
         when the page is framed: break out if the top frame is same-origin-reachable, else
         hide. A normal standalone PWA / browser-tab load is never affected. -->
    <script>
      (function () {
        try {
          if (window.self !== window.top) {
            try { window.top.location = window.self.location.href; }
            catch (e) { document.documentElement.style.display = "none"; }
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF8F3" />
    <!-- iOS PWA (Add to Home Screen): fullscreen standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oriex" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-180.png" />
    <title>Oriex</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm TLS to the Firebase hosts the DEFAULT login path hits, BEFORE the auth JS
         runs: identitytoolkit (sign-in), securetoken (token refresh — fires on every
         persisted-session restore, i.e. the common PWA reload), firestore (first read
         right after auth). crossorigin because Firebase web fetches are anonymous CORS,
         so the warmed socket is actually reused. (authDomain/firebaseapp.com is NOT
         contacted — login is Friend ID + password, no OAuth popup/redirect.) -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <!-- Load the web fonts WITHOUT blocking first paint: media="print" keeps the
         stylesheet out of the critical render, then onload promotes it to all.
         Text shows immediately in the system fallback (display=swap) and swaps when
         the fonts arrive — so the first screen appears noticeably faster. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Comfortaa:wght@500;700&family=Quicksand:wght@600;700&family=Fredoka:wght@500;600;700&family=Varela+Round&family=Mochiy+Pop+One&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link rel="stylesheet" href="./src/styles/utilities.css" />
    <link rel="stylesheet" href="./src/styles/app.css" />
    <!-- Opt-in "研鑽" re-skin of the original/legacy UI. Inert unless <body class="ox-skin">.
         NOT linked here anymore: it matched nothing on a normal visit yet bloated the
         render-blocking entry stylesheet for everyone. main.js now lazy-imports
         ./src/styles/skin-kensan.css only when the skin is actually enabled. -->

    <!-- 3D engine (three.js) is NOT loaded here synchronously anymore.
         It was render-blocking on every page; it is now fetched off the
         critical path via src/services/loadThree.js (see main.js). -->
    <!-- best-effort portrait lock (ignored on desktop) -->
    <script>try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock("portrait").catch(function(){})}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Boot watchdog. Rarely, a stale service-worker cache or a transient chunk
         fetch can leave the app blank on startup (a manual reload fixes it). If the
         app has NOT mounted into #root a few seconds after load, reload ONCE
         automatically so the user never has to. Guarded by sessionStorage so a
         genuinely broken build can never loop; window.__oxBootOk() clears the guard
         once the app has mounted (also auto-detected by the empty-#root check). -->
    <script>
      (function () {
        var KEY = "oxBootReloaded";
        function clearGuard() { try { sessionStorage.removeItem(KEY); } catch (e) {} }
        window.__oxBootOk = clearGuard;
        function mounted() {
          var root = document.getElementById("root");
          return !!(root && root.childElementCount > 0);
        }
        setTimeout(function () {
          if (mounted()) { clearGuard(); return; }
          try {
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, "1");
              location.reload();
            }
          } catch (e) { /* ignore */ }
        }, 8000);
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
