<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Oriex Home — 曙 (Akebono) design test</title>
<!--
  SKILL.md "from scratch" redesign of the ORIGINAL home — direction「曙 / Daybreak」.
  The hero is the thesis: today's study goal as a LIVING SUNRISE (rich dawn sky,
  fading stars, a glowing sun that RISES on load to the progress height, a horizon
  silhouette). One bold element (the sun + its warm light); everything else white,
  airy, navy, disciplined. Self-contained — open directly in a browser. Demo numbers.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --page:#eef2f8; --card:#ffffff; --ink:#1d2745; --ink-2:#3a4a6b;
    --mist:#727f9b; --line:#e6ebf3;
    --sun:#f6a02a; --sun-2:#ffd27a; --sun-deep:#e07d12; --sun-soft:#fdeccf;
    --teal:#2f9bb5; --violet:#7b6cf0; --rose:#ec6a86;
    --r:24px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#d8dfeb;display:grid;place-items:center;min-height:100vh;
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--ink)}
  .frame{position:relative;width:390px;min-height:812px;overflow:hidden;border-radius:34px;
    background:
      radial-gradient(120% 60% at 78% -6%, rgba(246,160,42,.16), rgba(246,160,42,0) 46%),
      linear-gradient(180deg,#f4f0ff 0%, var(--page) 22%);
    box-shadow:0 34px 90px rgba(29,39,69,.34)}
  .num{font-family:"Comfortaa","Zen Kaku Gothic New",sans-serif;font-variant-numeric:tabular-nums}

  /* page-load orchestration */
  .rise{opacity:0;transform:translateY(14px)}
  @media (prefers-reduced-motion:no-preference){
    .rise{animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
    .d1{animation-delay:.18s}.d2{animation-delay:.30s}.d3{animation-delay:.42s}.d4{animation-delay:.54s}.d5{animation-delay:.64s}
  }
  @media (prefers-reduced-motion:reduce){.rise{opacity:1;transform:none}}
  @keyframes rise{to{opacity:1;transform:none}}

  /* top bar */
  .top{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 18px) 18px 4px}
  .brand{display:flex;align-items:center;gap:7px;margin-right:auto;font-family:"Comfortaa",sans-serif;
    font-weight:700;font-size:19px;letter-spacing:.05em}
  .brand .u{width:18px;height:18px;color:var(--sun)}
  .tbtn{width:40px;height:40px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.85);
    display:grid;place-items:center;cursor:pointer;box-shadow:0 4px 12px rgba(29,39,69,.06);position:relative;
    backdrop-filter:blur(4px)}
  .tbtn svg{width:20px;height:20px;fill:none;stroke:var(--ink);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tbtn .dot{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;
    background:var(--sun);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center}

  /* greeting */
  .greet{padding:12px 22px 4px}
  .greet .hi{font-size:12.5px;color:var(--mist);font-weight:600;letter-spacing:.02em}
  .greet .name{font-family:"Comfortaa",sans-serif;font-weight:700;font-size:25px;margin-top:2px;letter-spacing:.01em}
  .greet .name b{color:var(--sun-deep)}

  /* ===== HERO — the living sunrise (signature) ===== */
  .hero{position:relative;margin:14px 16px 0;border-radius:28px;overflow:hidden;
    box-shadow:0 22px 46px rgba(29,39,69,.20), inset 0 0 0 1px rgba(255,255,255,.5)}
  .sky{position:relative;height:218px}
  .sky svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .eyebrow{position:absolute;top:15px;left:17px;z-index:3;display:flex;align-items:center;gap:6px;
    font-size:11.5px;font-weight:800;letter-spacing:.06em;color:#fff;text-shadow:0 1px 6px rgba(40,30,10,.35)}
  .eyebrow .u{width:14px;height:14px;color:#fff}
  /* the readout sits on the rising ground (white), curving up out of the sky */
  .ground{position:relative;margin-top:-34px;z-index:3;background:var(--card);
    border-radius:30px 30px 0 0;padding:16px 18px 16px}
  .read{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .read .big{font-family:"Comfortaa",sans-serif;font-weight:700;font-size:46px;line-height:.9;letter-spacing:-.01em}
  .read .big small{font-size:16px;color:var(--mist);font-weight:700;letter-spacing:0}
  .read .sub{font-size:11.5px;font-weight:800;color:var(--sun-deep);margin-top:7px;display:flex;align-items:center;gap:5px}
  .read .sub svg{width:13px;height:13px}
  .start{flex:none;border:none;cursor:pointer;border-radius:18px;width:64px;height:64px;color:#fff;
    font-family:"Comfortaa",sans-serif;font-weight:700;font-size:11px;
    background:radial-gradient(120% 120% at 35% 25%,#ffce7a,var(--sun) 70%,var(--sun-deep));
    box-shadow:0 12px 22px rgba(224,125,18,.42), inset 0 1px 1px rgba(255,255,255,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .start svg{width:21px;height:21px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .goalrow{display:flex;align-items:center;gap:9px;margin-top:14px}
  .track{flex:1;height:9px;border-radius:99px;background:#eef1f7;overflow:hidden;position:relative}
  .track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sun-deep),var(--sun),var(--sun-2))}
  .track .mk{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:#fff;
    box-shadow:0 0 0 2px var(--sun), 0 2px 5px rgba(224,125,18,.5);transform:translate(-50%,-50%)}
  .goalrow .pct{font-size:12px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}

  /* ===== stat trio with sparklines ===== */
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px 16px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px 12px 10px;
    box-shadow:0 8px 18px rgba(29,39,69,.05)}
  .stat .k{font-size:10px;color:var(--mist);font-weight:700;letter-spacing:.02em}
  .stat .v{font-family:"Comfortaa",sans-serif;font-weight:700;font-size:21px;margin-top:3px;
    display:flex;align-items:baseline;gap:2px}
  .stat .v small{font-size:10.5px;color:var(--mist);font-weight:700}
  .stat svg{display:block;width:100%;height:20px;margin-top:6px;overflow:visible}
  .vs{color:var(--sun-deep)} .vt{color:var(--teal)}

  /* ===== weekly skyline at dawn ===== */
  .panel{position:relative;margin:16px 16px 0;background:var(--card);border:1px solid var(--line);
    border-radius:22px;padding:15px 16px 14px;box-shadow:0 12px 26px rgba(29,39,69,.06);overflow:hidden}
  .panel-h{display:flex;align-items:center;gap:7px;font-family:"Comfortaa",sans-serif;font-weight:700;font-size:14px;position:relative;z-index:2}
  .panel-h .more{margin-left:auto;font-size:11px;font-weight:700;color:var(--mist);background:#eef2f7;border-radius:99px;padding:3px 10px}
  .panel-h svg{width:16px;height:16px;color:var(--teal)}
  .glow{position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;
    background:radial-gradient(circle,rgba(246,160,42,.18),transparent 65%);z-index:0}
  .sky2{position:relative;z-index:2;height:92px;margin:14px 2px 2px;border-bottom:1.5px solid var(--line)}
  .bars{position:absolute;inset:0;display:flex;align-items:flex-end;gap:8px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px}
  .bar i{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#c7e2ec,#e3eff4);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
  .bar.t i{background:linear-gradient(180deg,var(--sun),var(--sun-2));box-shadow:0 0 14px rgba(246,160,42,.5)}
  .bar span{font-size:10px;color:var(--mist);font-weight:700}
  .avg{position:relative;z-index:2;text-align:right;font-size:11.5px;font-weight:700;color:var(--mist);margin-top:9px}
  .avg b{color:var(--ink)}

  /* ===== tools ===== */
  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 6px;padding:18px 16px 6px}
  .tool{display:flex;flex-direction:column;align-items:center;gap:7px;border:none;background:none;cursor:pointer;
    color:var(--ink);font-size:11px;font-weight:700}
  .tool .ic{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;
    box-shadow:0 7px 15px rgba(29,39,69,.07), inset 0 0 0 1px rgba(255,255,255,.7)}
  .tool .ic svg{width:23px;height:23px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .i1{background:#fdeede}.i1 svg{stroke:#df8a39}
  .i2{background:#e6f2f7}.i2 svg{stroke:#2f9bb5}
  .i3{background:#efecfe}.i3 svg{stroke:#7b6cf0}
  .i4{background:#fdecf1}.i4 svg{stroke:#e06a8a}
  .i5{background:#e6f6ef}.i5 svg{stroke:#2fae87}
  .i6{background:#e8f0fd}.i6 svg{stroke:#3f86e0}
  .i7{background:#fdf1de}.i7 svg{stroke:#d98a2b}
  .i8{background:#eef0f5}.i8 svg{stroke:#8a93a8}

  /* ===== bottom nav ===== */
  .nav{position:sticky;bottom:0;margin:16px 14px;display:flex;background:rgba(255,255,255,.92);
    border:1px solid var(--line);border-radius:22px;padding:9px 6px;
    box-shadow:0 16px 34px rgba(29,39,69,.14);backdrop-filter:blur(12px)}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;
    color:var(--mist);font-size:10px;font-weight:700;cursor:pointer;position:relative}
  .nav svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .nav .on{color:var(--sun-deep)}
  .nav .on::before{content:"";position:absolute;top:-9px;width:22px;height:3px;border-radius:3px;background:var(--sun)}

  :focus-visible{outline:2.5px solid var(--sun);outline-offset:2px}

  /* sunrise + sky motion (reduced-motion respected) */
  @media (prefers-reduced-motion:no-preference){
    .sun-rise{animation:sunrise 1.5s cubic-bezier(.16,.84,.3,1) both}
    .rays{animation:spin 90s linear infinite;transform-origin:300px 96px}
    .twinkle{animation:tw 3.4s ease-in-out infinite}
    .twinkle.b{animation-delay:1.1s}.twinkle.c{animation-delay:2s}
  }
  @keyframes sunrise{from{transform:translateY(62px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:.9}}
</style>
</head>
<body>
<div class="frame">

  <div class="top rise">
    <div class="brand"><svg class="u" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M7 4c-2 1.5-3 4-3 7 0 4 3 8 8 8s8-4 8-8c0-3-1-5.5-3-7"/></svg>ORIEX</div>
    <button class="tbtn"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 004 0"/></svg><span class="dot">3</span></button>
    <button class="tbtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7 7 0 000-2l2-1.5-2-3.4-2.3 1a7 7 0 00-1.7-1L14.5 3h-5l-.4 2.6a7 7 0 00-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 000 2l-2 1.5 2 3.4 2.3-1a7 7 0 001.7 1l.4 2.6h5l.4-2.6a7 7 0 001.7-1l2.3 1 2-3.4-2-1.5z"/></svg></button>
  </div>

  <div class="greet rise d1">
    <div class="hi">おはよう。新しい一日のはじまり。</div>
    <div class="name">ヒカリ<b>さん</b></div>
  </div>

  <!-- HERO -->
  <div class="hero rise d2">
    <div class="sky">
      <svg viewBox="0 0 390 218" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
        <defs>
          <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3b4f86"/>
            <stop offset="34%" stop-color="#8a7fb4"/>
            <stop offset="62%" stop-color="#d99aa0"/>
            <stop offset="84%" stop-color="#f3b97e"/>
            <stop offset="100%" stop-color="#f9d79a"/>
          </linearGradient>
          <radialGradient id="sun" cx="50%" cy="44%" r="60%">
            <stop offset="0" stop-color="#fffaf0"/>
            <stop offset="42%" stop-color="#ffd27a"/>
            <stop offset="100%" stop-color="#f6a02a"/>
          </radialGradient>
          <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffd27a" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fff2cf" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#fff2cf" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <rect width="390" height="218" fill="url(#dawn)"/>
        <!-- fading stars -->
        <circle class="twinkle" cx="60" cy="38" r="1.4" fill="#fff"/>
        <circle class="twinkle b" cx="130" cy="24" r="1.1" fill="#fff"/>
        <circle class="twinkle c" cx="208" cy="44" r="1.3" fill="#fff"/>
        <circle class="twinkle b" cx="92" cy="70" r="1" fill="#fff"/>
        <circle class="twinkle" cx="250" cy="20" r="1" fill="#fff"/>
        <!-- the sun rises on load (group translates up into place) -->
        <g class="sun-rise">
          <circle cx="300" cy="96" r="92" fill="url(#halo)"/>
          <g class="rays" opacity=".5">
            <g stroke="#ffe6ad" stroke-width="2.4" stroke-linecap="round">
              <line x1="300" y1="36" x2="300" y2="14"/>
              <line x1="300" y1="156" x2="300" y2="178"/>
              <line x1="240" y1="96" x2="218" y2="96"/>
              <line x1="360" y1="96" x2="382" y2="96"/>
              <line x1="258" y1="54" x2="242" y2="38"/>
              <line x1="342" y1="138" x2="358" y2="154"/>
              <line x1="258" y1="138" x2="242" y2="154"/>
              <line x1="342" y1="54" x2="358" y2="38"/>
            </g>
          </g>
          <circle cx="300" cy="96" r="38" fill="url(#sun)"/>
          <ellipse cx="300" cy="200" rx="20" ry="120" fill="url(#beam)" opacity=".7"/>
        </g>
        <!-- horizon silhouettes (two layers for depth) -->
        <path d="M0 176 C70 160 120 184 200 172 S330 158 390 176 V218 H0 Z" fill="#caa07a" opacity=".5"/>
        <path d="M0 192 C90 180 150 200 240 190 S360 184 390 194 V218 H0 Z" fill="#9c7659" opacity=".5"/>
      </svg>
    </div>
    <div class="eyebrow"><svg class="u" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M7 4c-2 1.5-3 4-3 7 0 4 3 8 8 8s8-4 8-8c0-3-1-5.5-3-7"/></svg>きょうの学習</div>
    <div class="ground">
      <div class="read">
        <div>
          <div class="big num">90<small> / 180分</small></div>
          <div class="sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 3v3M5 7l2 2M19 7l-2 2M4 15h16a8 8 0 00-16 0z"/></svg>あと90分で、日の出。</div>
        </div>
        <button class="start"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg>はじめる</button>
      </div>
      <div class="goalrow">
        <div class="track"><i style="width:50%"></i><span class="mk" style="left:50%"></span></div>
        <span class="pct">50%</span>
      </div>
    </div>
  </div>

  <!-- stat trio -->
  <div class="stats rise d3">
    <div class="stat">
      <div class="k">累計学習</div><div class="v num">128<small>時間</small></div>
      <svg viewBox="0 0 80 20"><path d="M2 16 14 14 26 15 38 9 50 11 62 5 78 4" fill="none" stroke="#9fb0cf" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div class="stat">
      <div class="k">連続日数</div><div class="v vs num">21<small>日</small></div>
      <svg viewBox="0 0 80 20"><g fill="#f6a02a"><circle cx="6" cy="16" r="2"/><circle cx="18" cy="14" r="2"/><circle cx="30" cy="15" r="2"/><circle cx="42" cy="11" r="2"/><circle cx="54" cy="12" r="2"/><circle cx="66" cy="7" r="2"/><circle cx="76" cy="6" r="2.6"/></g></svg>
    </div>
    <div class="stat">
      <div class="k">偏差値</div><div class="v vt num">62.4</div>
      <svg viewBox="0 0 80 20"><path d="M2 17 L78 5" stroke="#bfe0ec" stroke-width="1.4" stroke-dasharray="3 3"/><path d="M2 15 18 13 34 14 50 9 66 8 78 4" fill="none" stroke="#2f9bb5" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- weekly skyline -->
  <div class="panel rise d4">
    <div class="glow"></div>
    <div class="panel-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M9 19V5M14 19v-7M19 19V8" stroke-linecap="round"/></svg>7日間の記録<span class="more">詳細</span></div>
    <div class="sky2">
      <div class="bars">
        <div class="bar"><i style="height:55%"></i><span>月</span></div>
        <div class="bar"><i style="height:72%"></i><span>火</span></div>
        <div class="bar"><i style="height:40%"></i><span>水</span></div>
        <div class="bar"><i style="height:90%"></i><span>木</span></div>
        <div class="bar"><i style="height:64%"></i><span>金</span></div>
        <div class="bar"><i style="height:48%"></i><span>土</span></div>
        <div class="bar t"><i style="height:50%"></i><span>今</span></div>
      </div>
    </div>
    <div class="avg">7日間の平均 <b>101分</b></div>
  </div>

  <!-- tools -->
  <div class="tools rise d5">
    <button class="tool"><span class="ic i1"><svg viewBox="0 0 24 24"><path d="M7 4h8l4 4v12H7z"/><path d="M9 10h6M9 14h6"/></svg></span>ノート</button>
    <button class="tool"><span class="ic i2"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M12 4v16"/></svg></span>単語帳</button>
    <button class="tool"><span class="ic i3"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="13" height="11" rx="2"/><rect x="8" y="5" width="13" height="11" rx="2"/></svg></span>暗記</button>
    <button class="tool"><span class="ic i4"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></span>問題集</button>
    <button class="tool"><span class="ic i5"><svg viewBox="0 0 24 24"><path d="M4 19V9M9 19V5M14 19v-7M19 19V8"/></svg></span>模試</button>
    <button class="tool"><span class="ic i6"><svg viewBox="0 0 24 24"><path d="M5 13a7 7 0 0114 0"/><rect x="3" y="13" width="4" height="7" rx="1.5"/><rect x="17" y="13" width="4" height="7" rx="1.5"/></svg></span>聞く</button>
    <button class="tool"><span class="ic i7"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg></span>暦</button>
    <button class="tool"><span class="ic i8"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg></span>その他</button>
  </div>

  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>ホーム</button>
    <button><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M9 2h6"/></svg>タイマー</button>
    <button><svg viewBox="0 0 24 24"><path d="M4 20V9M10 20V4M16 20v-8M22 20H2"/></svg>記録</button>
    <button><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9h-9z"/><path d="M12 3v9h9"/></svg>分析</button>
    <button><svg viewBox="0 0 24 24"><path d="M7 5c-1.5 1.4-2.5 3.6-2.5 6 0 4 3 7.5 7.5 7.5s7.5-3.5 7.5-7.5c0-2.4-1-4.6-2.5-6"/></svg>マイ</button>
  </nav>

</div>
</body>
</html>
