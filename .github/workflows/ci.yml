name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Security checks run FIRST so they execute even while the pre-existing
      # legacy lint/test debt is still being cleaned up (see SECURITY_AUDIT.md).
      - name: Secret scan
        run: npm run security:scan

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Audit (high+)
        run: npm audit --audit-level=high
