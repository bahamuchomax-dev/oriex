<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Oriex Home — preview v2 (no-scroll, big character)</title>
<!--
  v2: 背景(1BA16E71…) と メインキャラ(IMG_5012) のみ素材使用。他のUIは全て自作(CSS/SVG)。
  スクロールなしで1画面に収まるよう flex で高さ配分。キャラは大きく(ヒーロー)。
  ブラウザで直接開いて確認。数値は見本（本実装は実データ配線）。
-->
<style>
  :root{
    --bg:#0a0c14; --ink:#eef1fb; --muted:#9aa3bd;
    --red:#e8273c; --red-d:#b3142a; --blue:#3f8dff; --gold:#ffd36e; --good:#2bd47e;
    --glass:rgba(16,19,30,.62); --glass-2:rgba(22,26,40,.78); --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#1a1c22;display:grid;place-items:center;min-height:100vh;
    font-family:"Hiragino Sans","Noto Sans JP",-apple-system,system-ui,sans-serif;color:var(--ink)}
  .frame{position:relative;width:390px;height:760px;overflow:hidden;background:var(--bg);
    border-radius:30px;box-shadow:0 24px 70px rgba(0,0,0,.6)}

  /* background + character */
  .bg{position:absolute;inset:0;background:url("src/assets/home/1BA16E71-040A-4ADD-8EE6-383D57E63E42.png") center/cover no-repeat;z-index:0}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,20,.15) 0%,rgba(10,12,20,.0) 30%,rgba(10,12,20,.55) 100%)}
  /* character — sized so the WHOLE body fits in the upper area (still prominent) */
  /* character — maximized to ~full frame width (box ratio 0.75 = image's native ratio, so contain fills
     edge-to-edge with no letterbox), nudged higher. Whole body stays on screen (tiny bleed each side). */
  .char{position:absolute;right:-8px;top:18px;width:408px;height:544px;z-index:1;pointer-events:none;
    background:url("src/assets/home/IMG_5012.png") top right/contain no-repeat;
    filter:drop-shadow(-12px 16px 26px rgba(0,0,0,.55))}
  .glow{position:absolute;right:-20px;top:60px;width:300px;height:300px;z-index:0;border-radius:50%;
    background:radial-gradient(circle,rgba(232,39,60,.36),transparent 62%);filter:blur(9px)}

  /* layout column, no scroll */
  .col{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 14px calc(env(safe-area-inset-bottom,0px) + 10px);gap:10px}

  /* top bar */
  .top{display:flex;align-items:center;gap:10px}
  .brand{font-weight:900;letter-spacing:.6px;font-size:16px;margin-right:auto;display:flex;align-items:center;gap:5px}
  .brand .u{color:var(--red);font-size:18px}
  .tbtn{position:relative;width:38px;height:38px;border:none;cursor:pointer;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(120% 120% at 35% 25%,#2c3040,#101219 65%,#080a0f);
    box-shadow:0 2px 7px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.16);border:1px solid var(--line)}
  .tbtn svg{width:18px;height:18px;fill:none;stroke:#eef1fb;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .dot{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--red);
    color:#fff;font-size:10px;font-weight:900;display:grid;place-items:center;box-shadow:0 0 0 2px var(--bg)}

  /* profile glass card (overlaps the character) */
  .profile{width:53%;background:var(--glass-2);border:1px solid var(--line);border-radius:16px;padding:9px 10px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .pr-top{display:flex;align-items:center;gap:8px}
  .av{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:15px;font-weight:900;color:#fff;
    background:conic-gradient(from 200deg,var(--red),#ff7a4d,var(--blue),var(--red));box-shadow:0 0 0 2px rgba(255,255,255,.4)}
  .pr-name{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:900}
  .pr-name svg{width:12px;height:12px;stroke:#cdd3e6;fill:none;stroke-width:2}
  .lvrow{display:flex;align-items:center;justify-content:space-between;margin:9px 0 5px;font-size:11px;font-weight:800;color:var(--muted)}
  .lv{background:var(--red);color:#fff;padding:2px 9px;border-radius:7px}
  .exp{height:6px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
  .exp>i{display:block;height:100%;width:63%;background:linear-gradient(90deg,var(--red),var(--blue))}
  .stats{display:flex;gap:8px;margin-top:11px}
  .stat{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:7px 9px}
  .stat .k{font-size:9px;color:var(--muted);font-weight:800}
  .stat .v{font-size:17px;font-weight:900;margin-top:1px}
  .stat .v small{font-size:10px;opacity:.8}
  .stat .s{font-size:8.5px;margin-top:1px;color:var(--good)}
  .stat .s.gold{color:var(--gold)}

  .spacer{flex:1 1 auto;min-height:0}

  /* today card — compact, floats at the character's feet (right); timer overlaps */
  .today{position:absolute;right:12px;top:362px;width:180px;z-index:5}
  .today-card{position:relative;background:var(--glass-2);border:1px solid var(--line);border-radius:15px;
    padding:9px 66px 10px 12px;backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);box-shadow:0 12px 28px rgba(0,0,0,.45)}
  .today-h{font-size:11px;font-weight:900;color:#ff8a96;display:flex;align-items:center;gap:4px}
  .today-h .u{color:var(--red)}
  .today-goal{font-size:9.5px;font-weight:800;color:var(--muted);margin-top:4px}
  .today-goal .chip{background:var(--red);color:#fff;border-radius:5px;padding:1px 6px;margin-right:5px}
  .today-big{font-size:21px;font-weight:900;line-height:1;margin-top:3px}
  .today-big small{font-size:11px;color:var(--muted);font-weight:800}
  .today-note{font-size:9.5px;font-weight:800;color:#ff9aa6;margin-top:3px}
  .timer-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;
    border:none;cursor:pointer;color:#fff;font-weight:900;font-size:8.5px;line-height:1.1;text-align:center;
    background:linear-gradient(135deg,#ff3d52,#b3142a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    box-shadow:0 6px 16px rgba(179,20,42,.55),0 0 0 2px rgba(10,12,20,.55)}
  .timer-btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2}

  /* two compact cards: chart + plan */
  .row2{display:flex;gap:10px}
  .card{flex:1;background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:10px;backdrop-filter:blur(12px)}
  .card-h{font-size:11px;font-weight:900;display:flex;align-items:center;gap:5px}
  .card-h .more{margin-left:auto;font-size:9px;color:var(--muted);background:rgba(255,255,255,.08);border-radius:99px;padding:2px 7px}
  .chart{display:flex;align-items:flex-end;gap:4px;height:62px;margin:8px 1px 3px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px}
  .bar i{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#ff5161,#b3142a)}
  .bar.t i{background:repeating-linear-gradient(45deg,#3f8dff,#3f8dff 3px,#7fb3ff 3px,#7fb3ff 6px)}
  .bar .l{font-size:8px;color:var(--muted)}
  .avg{font-size:10px;font-weight:800;color:var(--muted)}
  .avg b{color:#ff8a96}
  .plan{display:flex;flex-direction:column;gap:5px;margin-top:7px}
  .pl{display:flex;align-items:center;gap:6px;font-size:10.5px}
  .box{width:13px;height:13px;border-radius:4px;border:1.5px solid var(--muted);flex:none;display:grid;place-items:center}
  .box.on{background:var(--good);border-color:var(--good)}
  .box.on svg{width:9px;height:9px;stroke:#fff;stroke-width:3;fill:none}
  .pl .nm{flex:1;font-weight:700}
  .pl .nm.done{color:var(--muted);text-decoration:line-through}
  .pl .mn{font-size:9px;color:var(--muted);font-weight:800}
  .plan-foot{font-size:10px;font-weight:900;text-align:right;margin-top:6px;color:var(--gold)}

  /* tools — self-built SVG icons */
  .tools{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
  .tool{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:8px;font-weight:800}
  .tool .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;box-shadow:0 4px 10px rgba(0,0,0,.4)}
  .tool .ic svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .t-red{background:linear-gradient(135deg,#ff4d5e,#c8102e)} .t-blue{background:linear-gradient(135deg,#4f8dff,#2856c8)}
  .t-purple{background:linear-gradient(135deg,#9a6bff,#6634c8)} .t-crim{background:linear-gradient(135deg,#ff5b7a,#b3143f)}
  .t-teal{background:linear-gradient(135deg,#2bd4c0,#138a8a)} .t-orange{background:linear-gradient(135deg,#ff9a3d,#d86a10)}
  .t-green{background:linear-gradient(135deg,#3bd47e,#149a52)} .t-gray{background:linear-gradient(135deg,#7a8295,#444a5a)}

  /* bottom nav — self-built */
  .nav{display:flex;background:var(--glass-2);border:1px solid var(--line);border-radius:20px;padding:7px 6px;backdrop-filter:blur(16px);box-shadow:0 10px 26px rgba(0,0,0,.45)}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--muted);font-size:9.5px;font-weight:800;cursor:pointer;position:relative}
  .nav button svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .nav button.on{color:#fff}
  .nav button.on .pill{position:absolute;top:-3px;width:42px;height:30px;border-radius:12px;background:rgba(232,39,60,.22);z-index:-1}
  .nav .nd{position:absolute;top:-1px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px var(--glass-2)}
</style>
</head>
<body>
<div class="frame">
  <div class="bg"></div>
  <div class="glow"></div>
  <div class="char"></div>

  <div class="col">
    <!-- top bar -->
    <div class="top">
      <div class="brand"><span class="u">∪</span>ORIEX</div>
      <button class="tbtn"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 004 0"/></svg><span class="dot">3</span></button>
      <button class="tbtn"><svg viewBox="0 0 24 24"><rect x="4" y="9" width="16" height="11" rx="1.5"/><path d="M4 13h16M12 9v11"/></svg><span class="dot">1</span></button>
      <button class="tbtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7 7 0 000-2l2-1.5-2-3.4-2.3 1a7 7 0 00-1.7-1L14.5 3h-5l-.4 2.6a7 7 0 00-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 000 2l-2 1.5 2 3.4 2.3-1a7 7 0 001.7 1l.4 2.6h5l.4-2.6a7 7 0 001.7-1l2.3 1 2-3.4-2-1.5z"/></svg></button>
    </div>

    <!-- profile (overlaps character) -->
    <div class="profile">
      <div class="pr-top">
        <div class="av">ヒ</div>
        <div style="flex:1">
          <div class="pr-name">ヒカリ <svg viewBox="0 0 24 24"><path d="M4 20l4-1L19 8l-3-3L5 16z"/></svg></div>
          <div class="lvrow" style="margin:6px 0 0"><span class="lv">Lv. 24</span><small>EXP 63%</small></div>
        </div>
      </div>
      <div class="exp" style="margin-top:8px"><i></i></div>
      <div class="stats">
        <div class="stat"><div class="k">累計学習時間</div><div class="v">128<small>時間</small>45<small>分</small></div><div class="s">先月比 +18時間</div></div>
        <div class="stat"><div class="k">連続学習日数</div><div class="v">🔥21<small>日</small></div><div class="s gold">自己ベスト更新中！</div></div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- today card (floats at the character's feet); timer overlaps on top -->
    <div class="today">
      <div class="today-card">
        <div class="today-h"><span class="u">∪</span> きょうの学習</div>
        <div class="today-goal"><span class="chip">目標</span>180分</div>
        <div class="today-big">90 <small>/ 180分</small></div>
        <div class="today-note">あと90分で達成！</div>
        <button class="timer-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg>タイマー</button>
      </div>
    </div>

    <!-- chart + plan -->
    <div class="row2">
      <div class="card">
        <div class="card-h">📊 7日間の記録<span class="more">詳細</span></div>
        <div class="chart">
          <div class="bar"><i style="height:63%"></i><span class="l">月</span></div>
          <div class="bar"><i style="height:80%"></i><span class="l">火</span></div>
          <div class="bar"><i style="height:40%"></i><span class="l">水</span></div>
          <div class="bar"><i style="height:100%"></i><span class="l">木</span></div>
          <div class="bar"><i style="height:73%"></i><span class="l">金</span></div>
          <div class="bar"><i style="height:53%"></i><span class="l">土</span></div>
          <div class="bar t"><i style="height:60%"></i><span class="l">今</span></div>
        </div>
        <div class="avg">平均 <b>101分</b></div>
      </div>
      <div class="card">
        <div class="card-h">📋 今週の予定<span class="more">詳細</span></div>
        <div class="plan">
          <div class="pl"><span class="box on"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span><span class="nm done">数学</span><span class="mn">120分</span></div>
          <div class="pl"><span class="box on"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span><span class="nm done">英語</span><span class="mn">90分</span></div>
          <div class="pl"><span class="box"></span><span class="nm">化学</span><span class="mn">60分</span></div>
          <div class="pl"><span class="box"></span><span class="nm">現代文</span><span class="mn">60分</span></div>
        </div>
        <div class="plan-foot">👑 3 / 5</div>
      </div>
    </div>

    <!-- tools -->
    <div class="tools">
      <button class="tool"><span class="ic t-red"><svg viewBox="0 0 24 24"><path d="M7 4h8l4 4v12H7z"/><path d="M9 9h6M9 13h6"/></svg></span>ノート</button>
      <button class="tool"><span class="ic t-blue"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M12 4v16"/></svg></span>単語帳</button>
      <button class="tool"><span class="ic t-purple"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="13" height="11" rx="2"/><rect x="8" y="5" width="13" height="11" rx="2"/></svg></span>暗記</button>
      <button class="tool"><span class="ic t-crim"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></span>問題集</button>
      <button class="tool"><span class="ic t-teal"><svg viewBox="0 0 24 24"><path d="M4 19V9M9 19V5M14 19v-7M19 19V8"/></svg></span>模試</button>
      <button class="tool"><span class="ic t-orange"><svg viewBox="0 0 24 24"><path d="M5 13a7 7 0 0114 0"/><rect x="3" y="13" width="4" height="7" rx="1.5"/><rect x="17" y="13" width="4" height="7" rx="1.5"/></svg></span>リスニング</button>
      <button class="tool"><span class="ic t-green"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg></span>暦</button>
      <button class="tool"><span class="ic t-gray"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.4" fill="#fff" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="#fff" stroke="none"/><circle cx="18" cy="12" r="1.4" fill="#fff" stroke="none"/></svg></span>その他</button>
    </div>

    <!-- bottom nav -->
    <nav class="nav">
      <button class="on"><span class="pill"></span><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>ホーム</button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M9 2h6"/></svg>タイマー</button>
      <button><svg viewBox="0 0 24 24"><path d="M4 20V9M10 20V4M16 20v-8M22 20H2"/></svg>記録</button>
      <button><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9h-9z"/><path d="M12 3v9h9"/></svg>分析</button>
      <button><span class="nd"></span><svg viewBox="0 0 24 24"><path d="M7 5c-1.5 1.4-2.5 3.6-2.5 6 0 4 3 7.5 7.5 7.5s7.5-3.5 7.5-7.5c0-2.4-1-4.6-2.5-6"/></svg>マイ</button>
    </nav>
  </div>
</div>
</body>
</html>
