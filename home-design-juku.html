<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Oriex — 塾生向けホーム (design test)</title>
<!--
  SKILL.md redesign for JUKU students — intuition first. The thesis is "今日やること":
  the teacher's daily mission + one big START action. Distinctiveness comes from a
  precise, color-coded system (blue=act, green=done, amber=streak) and clean execution,
  not decoration. Self-contained; demo numbers. Open directly in a browser.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2640; --mist:#7a8398; --line:#e9edf5;
    --primary:#4f6bed; --primary-d:#3a52c8; --primary-soft:#ebeefe;
    --good:#1dbf73; --good-soft:#e4f7ee;
    --amber:#ffa726; --amber-soft:#fff2dd;
    --cyan:#16a8c7; --violet:#8a6cf0; --rose:#e7607f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#dde3ee;display:grid;place-items:center;min-height:100vh;
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--ink)}
  .frame{width:390px;min-height:820px;background:var(--bg);border-radius:34px;overflow:hidden;
    box-shadow:0 30px 80px rgba(31,38,64,.30);padding-bottom:8px}
  .dsp{font-family:"Zen Maru Gothic","Zen Kaku Gothic New",sans-serif}
  .num{font-variant-numeric:tabular-nums}

  /* header */
  .head{display:flex;align-items:center;gap:11px;padding:calc(env(safe-area-inset-top,0px) + 18px) 18px 8px}
  .av{width:44px;height:44px;border-radius:15px;flex:none;display:grid;place-items:center;color:#fff;font-weight:900;
    font-family:"Zen Maru Gothic",sans-serif;font-size:18px;background:linear-gradient(145deg,#6d86ff,var(--primary))}
  .head .who{flex:1;min-width:0}
  .head .hi{font-size:12px;color:var(--mist);font-weight:600}
  .head .nm{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:18px;line-height:1.15}
  .bell{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:var(--card);
    display:grid;place-items:center;cursor:pointer;position:relative}
  .bell svg{width:21px;height:21px;fill:none;stroke:var(--ink);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .bell .dot{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;
    background:var(--rose);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;border:2px solid var(--bg)}

  /* today goal — the one clear action */
  .goal{margin:10px 16px 0;background:linear-gradient(160deg,#5a73f0,var(--primary-d));border-radius:24px;
    padding:18px;color:#fff;box-shadow:0 16px 32px rgba(79,107,237,.32);position:relative;overflow:hidden}
  .goal::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;
    background:rgba(255,255,255,.08)}
  .goal-top{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
  .ring{width:84px;height:84px;flex:none;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .ring .mid b{font-family:"Zen Maru Gothic",sans-serif;font-size:21px;font-weight:900}
  .ring .mid small{font-size:9.5px;opacity:.85;margin-top:2px}
  .goal-txt{flex:1}
  .goal-txt .lab{font-size:12px;opacity:.85;font-weight:600}
  .goal-txt .big{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:26px;margin-top:2px}
  .goal-txt .big small{font-size:13px;opacity:.8;font-weight:700}
  .goal-txt .rem{font-size:12px;opacity:.9;font-weight:700;margin-top:3px}
  .start{margin-top:15px;width:100%;border:none;cursor:pointer;border-radius:16px;padding:15px;background:#fff;
    color:var(--primary-d);font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:16px;
    display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1;box-shadow:0 6px 14px rgba(0,0,0,.12)}
  .start svg{width:21px;height:21px;fill:none;stroke:var(--primary-d);stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}

  /* section heading */
  .sec{display:flex;align-items:center;gap:8px;margin:22px 18px 10px}
  .sec h2{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:16px}
  .sec .from{font-size:11px;font-weight:800;color:var(--primary);background:var(--primary-soft);border-radius:99px;padding:3px 9px}
  .sec .cnt{margin-left:auto;font-size:12.5px;font-weight:800;color:var(--mist)}
  .sec .cnt b{color:var(--good)}

  /* today's mission — the signature board */
  .mission{margin:0 16px;background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:6px 6px;box-shadow:0 10px 22px rgba(31,38,64,.06)}
  .task{display:flex;align-items:center;gap:12px;padding:12px 12px;border-radius:14px}
  .task+.task{border-top:1px solid var(--line)}
  .task .box{width:26px;height:26px;flex:none;border-radius:9px;border:2px solid #d5dbe8;display:grid;place-items:center}
  .task .box svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .task.done .box{background:var(--good);border-color:var(--good)}
  .task.done .box svg{opacity:1}
  .task .body{flex:1;min-width:0}
  .task .body .t{font-weight:700;font-size:14.5px}
  .task.done .body .t{color:var(--mist);text-decoration:line-through}
  .task .body .meta{display:flex;align-items:center;gap:7px;margin-top:3px}
  .tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:7px}
  .tag.math{color:var(--primary);background:var(--primary-soft)}
  .tag.eng{color:var(--cyan);background:#e1f4f9}
  .tag.sci{color:var(--violet);background:#efeafe}
  .tag.jpn{color:var(--rose);background:#fdeaef}
  .task .body .min{font-size:11.5px;color:var(--mist);font-weight:700}
  .task .go{width:30px;height:30px;flex:none;border-radius:10px;background:var(--bg);display:grid;place-items:center}
  .task .go svg{width:16px;height:16px;fill:none;stroke:var(--mist);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}

  /* quick tools */
  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:13px 8px;padding:6px 18px 0}
  .tool{display:flex;flex-direction:column;align-items:center;gap:7px;border:none;background:none;cursor:pointer;
    color:var(--ink);font-size:11.5px;font-weight:700}
  .tool .ic{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;color:#fff;
    box-shadow:0 7px 14px rgba(31,38,64,.12)}
  .tool .ic svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.95;stroke-linecap:round;stroke-linejoin:round}
  .b1{background:linear-gradient(150deg,#6d86ff,#4f6bed)} .b2{background:linear-gradient(150deg,#3fc0db,#16a8c7)}
  .b3{background:linear-gradient(150deg,#a08bff,#8a6cf0)} .b4{background:linear-gradient(150deg,#ff7ea0,#e7607f)}
  .b5{background:linear-gradient(150deg,#3ed79a,#1dbf73)} .b6{background:linear-gradient(150deg,#ffb84d,#ffa726)}
  .b7{background:linear-gradient(150deg,#5db0ff,#2f8fe6)} .b8{background:linear-gradient(150deg,#9aa6bd,#7a8398)}

  /* week strip */
  .week{margin:20px 16px 6px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px 16px;
    box-shadow:0 10px 22px rgba(31,38,64,.06)}
  .week-h{display:flex;align-items:center;font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:14px}
  .week-h .streak{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:800;color:var(--amber)}
  .week-h .streak svg{width:15px;height:15px;fill:var(--amber);stroke:none}
  .bars{display:flex;align-items:flex-end;gap:8px;height:70px;margin-top:14px}
  .bars .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
  .bars .c i{width:60%;max-width:16px;border-radius:5px 5px 3px 3px;background:#dbe2f0}
  .bars .c.on i{background:linear-gradient(180deg,#6d86ff,var(--primary))}
  .bars .c span{font-size:10px;font-weight:700;color:var(--mist)}

  /* bottom nav */
  .nav{position:sticky;bottom:0;margin:14px 14px 0;display:flex;background:var(--card);border:1px solid var(--line);
    border-radius:22px;padding:9px 6px;box-shadow:0 14px 30px rgba(31,38,64,.13)}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;
    color:var(--mist);font-size:10px;font-weight:700;cursor:pointer;position:relative}
  .nav svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .nav .on{color:var(--primary)}
  .nav .on::before{content:"";position:absolute;top:-9px;width:24px;height:3px;border-radius:3px;background:var(--primary)}
  :focus-visible{outline:2.5px solid var(--primary);outline-offset:2px}
</style>
</head>
<body>
<div class="frame">

  <!-- header -->
  <div class="head">
    <div class="av">ヒ</div>
    <div class="who">
      <div class="hi">こんにちは</div>
      <div class="nm">ヒカリ さん</div>
    </div>
    <button class="bell"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 004 0"/></svg><span class="dot">3</span></button>
  </div>

  <!-- today's goal + START -->
  <div class="goal">
    <div class="goal-top">
      <div class="ring">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle cx="42" cy="42" r="36" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="9"/>
          <circle cx="42" cy="42" r="36" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="226" stroke-dashoffset="113"/>
        </svg>
        <div class="mid"><b>50%</b><small>達成</small></div>
      </div>
      <div class="goal-txt">
        <div class="lab">今日の学習</div>
        <div class="big num">90<small> / 180分</small></div>
        <div class="rem">目標まであと 90分</div>
      </div>
    </div>
    <button class="start"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg>勉強をはじめる</button>
  </div>

  <!-- today's mission (signature) -->
  <div class="sec"><h2>今日のミッション</h2><span class="from">先生から</span><span class="cnt"><b>2</b>／4 完了</span></div>
  <div class="mission">
    <div class="task done">
      <span class="box"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>
      <div class="body"><div class="t">数学：二次関数の演習</div><div class="meta"><span class="tag math">数学</span><span class="min">30分</span></div></div>
      <span class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>
    <div class="task done">
      <span class="box"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>
      <div class="body"><div class="t">英単語：Unit 12（50語）</div><div class="meta"><span class="tag eng">英語</span><span class="min">20分</span></div></div>
      <span class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>
    <div class="task">
      <span class="box"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>
      <div class="body"><div class="t">化学：理論化学のまとめ</div><div class="meta"><span class="tag sci">理科</span><span class="min">40分</span></div></div>
      <span class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>
    <div class="task">
      <span class="box"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>
      <div class="body"><div class="t">現代文：読解問題 2題</div><div class="meta"><span class="tag jpn">国語</span><span class="min">30分</span></div></div>
      <span class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>
  </div>

  <!-- quick tools -->
  <div class="sec"><h2>クイック</h2></div>
  <div class="tools">
    <button class="tool"><span class="ic b1"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M12 4v16"/></svg></span>単語帳</button>
    <button class="tool"><span class="ic b2"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></span>問題集</button>
    <button class="tool"><span class="ic b3"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="13" height="11" rx="2"/><rect x="8" y="5" width="13" height="11" rx="2"/></svg></span>暗記</button>
    <button class="tool"><span class="ic b4"><svg viewBox="0 0 24 24"><path d="M7 4h8l4 4v12H7z"/><path d="M9 10h6M9 14h6"/></svg></span>ノート</button>
    <button class="tool"><span class="ic b5"><svg viewBox="0 0 24 24"><path d="M4 19V9M9 19V5M14 19v-7M19 19V8"/></svg></span>模試</button>
    <button class="tool"><span class="ic b6"><svg viewBox="0 0 24 24"><path d="M5 13a7 7 0 0114 0"/><rect x="3" y="13" width="4" height="7" rx="1.5"/><rect x="17" y="13" width="4" height="7" rx="1.5"/></svg></span>リスニング</button>
    <button class="tool"><span class="ic b7"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M9 2h6"/></svg></span>タイマー</button>
    <button class="tool"><span class="ic b8"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg></span>その他</button>
  </div>

  <!-- week -->
  <div class="week">
    <div class="week-h">今週の学習
      <span class="streak"><svg viewBox="0 0 24 24"><path d="M12 2c0 3-1.5 6-3 8 0 4 2 7 3 11s3-7 3-11c-1.5-2-3-5-3-8z"/></svg>21日 連続</span>
    </div>
    <div class="bars">
      <div class="c"><i style="height:55%"></i><span>月</span></div>
      <div class="c"><i style="height:72%"></i><span>火</span></div>
      <div class="c"><i style="height:42%"></i><span>水</span></div>
      <div class="c"><i style="height:90%"></i><span>木</span></div>
      <div class="c"><i style="height:64%"></i><span>金</span></div>
      <div class="c"><i style="height:48%"></i><span>土</span></div>
      <div class="c on"><i style="height:50%"></i><span>今日</span></div>
    </div>
  </div>

  <!-- bottom nav -->
  <nav class="nav">
    <button class="on"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>ホーム</button>
    <button><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M9 2h6"/></svg>学習</button>
    <button><svg viewBox="0 0 24 24"><path d="M4 20V9M10 20V4M16 20v-8M22 20H2"/></svg>記録</button>
    <button><svg viewBox="0 0 24 24"><path d="M7 9a5 5 0 1110 0c0 4-5 9-5 9S7 13 7 9z"/><circle cx="12" cy="9" r="1.6"/></svg>先生</button>
    <button><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/></svg>マイ</button>
  </nav>

</div>
</body>
</html>
